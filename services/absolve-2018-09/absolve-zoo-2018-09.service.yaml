---
slivka-version: "0.8"
name: Absolve zoo model
description: 'Absolve is a command line tool for annotating antibody variable
  domain sequences with:

        *  ORF
        *  Framework and CDR regions
        *  Kabat Numbering
        *  Germline Assignment
        *  Somatic Hypermutation

  Note that this current Slivka service implementation hard-codes a number of
  parameters in order to support use *specifically on proteins* by GYDE.  A
  more general Absolve service would require more work (in particular, some
  thought about where to store the germ line databases and how to select which
  ones to use for a given run.)'
author: Genentech
version: "unknown"
license: MIT
classifiers:
  - 'Topic :: Computational biology :: Sequence analysis'

parameters:
  input:
    type: file
    media-type: application/fasta
    name: Input file
    description: FASTA-formatter protein sequences to analyse
    required: true
  multihit:
    type: int
    name: Report multiple hits
    description: Report multiple hits
    required: false

# run the script with python; environment variables are supported
command:
- bash
- ${SLIVKA_HOME}/bin/absolve-zoo.sh

args:
  input:
    arg: --R1 $(value)
    symlink: input.fa
  multihit:
    arg: --multihit $(value)
  _const0:
    arg: --AA
    default: present
  _const1:
    arg: --useAligner $(value)
    default: SWA
  _const2:
    arg: --VH {{ runtime-path:dbs/zoo }}/$(value)
    default: VHv.aa.fa
  _const3:
    arg: --JH {{ runtime-path:dbs/zoo }}/$(value)
    default: VHj.aa.fa
  _const4:
    arg: --VL {{ runtime-path:dbs/zoo }}/$(value)
    default: VLv.aa.fa
  _const5:
    arg: --JL {{ runtime-path:dbs/zoo }}/$(value)
    default: VLj.aa.fa
  _const6:
    arg: --outdir $(value)
    default: absolve

outputs:
  log:
    # standard output and error streams are automatically redirected
    # to stdout and stderr files respectively
    path: stdout
    name: Output Log
    media-type: text/plain
  error-log:
    path: stderr
    name: Error Log
    media-type: text/plain
  matches:
    path: absolve/absolve.tsv
    name: Germ-line matches
    media-type: text/tsv
  db-vh:
    path: dbs/VHv.aa.fa
    name: VH database
    media-type: application/fasta
  db-jh:
    path: dbs/VHj.aa.fa
    name: JH database
    media-type: application/fasta
  db-vl:
    path: dbs/VLv.aa.fa
    name: VL database
    media-type: application/fasta
  db-jl:
    path: dbs/VLj.aa.fa
    name: JL database
    media-type: application/fasta

execution:
  runners:
    default: !include _profiles.yaml::default
...
